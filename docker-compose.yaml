services:

  mongo:
    image: mongo:latest
    container_name: bd2-tpo-g10-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
      - ./example_datasets:/example_datasets:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
  cassandra:
    image: cassandra:latest
    container_name: bd2-tpo-g10-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  cassandra-init:
    image: cassandra:latest
    container_name: bd2-tpo-g10-cassandra-init
    volumes:
      - ./example_datasets:/example_datasets:ro
      - ./init-cassandra.sh:/init-cassandra.sh:ro
      - cassandra_data:/cassandra_data
    environment:
      - CASSANDRA_HOST=${CASSANDRA_HOST}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
    entrypoint: ["/bin/bash", "/init-cassandra.sh"]
    depends_on:
      cassandra:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bd2-tpo-g10-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
      - CASSANDRA_USER=${CASSANDRA_USER}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - CASSANDRA_HOST=${CASSANDRA_HOST}
      - CASSANDRA_DC=${CASSANDRA_DC}
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
    depends_on:
      mongo:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully

volumes:
  mongo_data:
    driver: local
    name: bd2-tpo-g10-mongo
  cassandra_data:
    driver: local
    name: bd2-tpo-g10-cassandra
